<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>My Chore Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #6EC6F5;
    --sun: #FFD93D;
    --mint: #6EDFA0;
    --coral: #FF8B6A;
    --lilac: #C89FE8;
    --white: #FFFDF7;
    --card: #FFFFFF;
    --dark: #2D2A4A;
    --soft: #F0EBF8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #B8E4FF 0%, #D4F5E4 50%, #FFE8D6 100%);
    min-height: 100vh;
    color: var(--dark);
    padding-bottom: 40px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #7B5EA7 0%, #5B8FD4 100%);
    padding: 24px 20px 32px;
    text-align: center;
    position: relative;
    border-radius: 0 0 40px 40px;
    box-shadow: 0 8px 30px rgba(91,75,167,0.25);
  }
  .header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2.2rem;
    font-weight: 800;
    color: white;
    text-shadow: 2px 3px 0px rgba(0,0,0,0.15);
    letter-spacing: -0.5px;
  }
  .header .subtitle {
    color: rgba(255,255,255,0.85);
    font-size: 0.95rem;
    font-weight: 600;
    margin-top: 4px;
  }
  .stars-decoration {
    position: absolute;
    top: 12px; right: 16px;
    font-size: 1.5rem;
    opacity: 0.7;
  }
  .stars-decoration-left {
    position: absolute;
    top: 12px; left: 16px;
    font-size: 1.5rem;
    opacity: 0.7;
  }

  /* MARBLE JAR SECTION */
  .marble-section {
    margin: -16px 16px 0;
    background: white;
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .marble-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .marble-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--dark);
  }
  .marble-count-badge {
    background: linear-gradient(135deg, #FFD93D, #FF8B6A);
    color: white;
    font-weight: 800;
    font-size: 1rem;
    padding: 4px 14px;
    border-radius: 20px;
    font-family: 'Baloo 2', cursive;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .marble-count-badge.pop {
    animation: badgePop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes badgePop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.4); }
    100% { transform: scale(1); }
  }
  .jar-container {
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .jar-canvas-wrap {
    flex-shrink: 0;
    position: relative;
    width: 130px;
  }
  #jarCanvas {
    width: 130px;
    height: 180px;
    display: block;
  }
  /* Floating marble drop animation */
  .marble-drop-anim {
    position: fixed;
    width: 22px; height: 22px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 500;
    animation: marbleDropFly 0.7s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
  }
  @keyframes marbleDropFly {
    0%   { transform: scale(0) translateY(0); opacity: 1; }
    60%  { transform: scale(1.2) translateY(20px); opacity: 1; }
    100% { transform: scale(0.6) translateY(60px); opacity: 0; }
  }

  .goal-info { flex: 1; padding-top: 6px; }
  .goal-bar-track {
    background: #EEE;
    border-radius: 20px;
    height: 18px;
    overflow: hidden;
    margin-bottom: 8px;
    position: relative;
  }
  .goal-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #6EC6F5, #C89FE8);
    border-radius: 20px;
    transition: width 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-width: 4px;
    position: relative;
  }
  .goal-bar-fill::after {
    content: '';
    position: absolute;
    top: 3px; left: 6px; right: 6px;
    height: 5px;
    background: rgba(255,255,255,0.4);
    border-radius: 4px;
  }
  .goal-text {
    font-size: 0.82rem;
    font-weight: 700;
    color: #888;
    text-align: right;
  }
  .goal-text span { color: #7B5EA7; }

  .prize-box {
    margin-top: 14px;
    background: linear-gradient(135deg, #FFF5D6, #FFE8D6);
    border: 2px dashed #FFD93D;
    border-radius: 16px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .prize-box .prize-emoji { font-size: 1.6rem; }
  .prize-box .prize-text { font-size: 0.88rem; font-weight: 700; color: #B07A00; }
  .prize-box .prize-name { font-size: 1rem; font-weight: 800; color: var(--dark); }

  /* DATE BAR */
  .date-bar {
    margin: 16px 16px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .date-label {
    font-family: 'Baloo 2', cursive;
    font-weight: 700;
    font-size: 1.05rem;
    color: #5B5B8A;
  }
  .all-done-badge {
    background: linear-gradient(135deg, #6EDFA0, #38C172);
    color: white;
    font-size: 0.78rem;
    font-weight: 800;
    padding: 3px 12px;
    border-radius: 20px;
    display: none;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* CHORE CARDS */
  .chores-list {
    margin: 12px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .chore-card {
    background: white;
    border-radius: 20px;
    padding: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    border: 2.5px solid transparent;
    transition: all 0.3s ease;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .chore-card.done {
    border-color: #6EDFA0;
    background: linear-gradient(135deg, #F0FFF6, #FFFFFF);
  }
  .chore-card.partial {
    border-color: #FFD93D;
    background: linear-gradient(135deg, #FFFDF0, #FFFFFF);
  }
  .chore-card.not-done {
    border-color: #FF8B6A;
    background: linear-gradient(135deg, #FFF5F2, #FFFFFF);
  }
  .chore-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chore-emoji {
    font-size: 1.8rem;
    width: 44px;
    height: 44px;
    background: var(--soft);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .chore-info { flex: 1; }
  .chore-name {
    font-family: 'Baloo 2', cursive;
    font-weight: 700;
    font-size: 1rem;
    color: var(--dark);
  }
  .chore-desc {
    font-size: 0.78rem;
    color: #999;
    font-weight: 600;
    margin-top: 1px;
  }
  .chore-status-icon {
    font-size: 1.4rem;
    width: 36px;
    text-align: center;
    transition: all 0.3s;
  }

  /* EXPAND AREA */
  .chore-expand {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
  .chore-card.expanded .chore-expand {
    max-height: 400px;
  }
  .chore-expand-inner {
    padding-top: 14px;
    border-top: 1.5px dashed #EEE;
    margin-top: 14px;
  }
  .expand-label {
    font-size: 0.82rem;
    font-weight: 700;
    color: #7B5EA7;
    margin-bottom: 8px;
  }
  .chore-textarea {
    width: 100%;
    border: 2px solid #E0D9F5;
    border-radius: 14px;
    padding: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--dark);
    resize: none;
    height: 80px;
    background: #FAFAFF;
    outline: none;
    transition: border-color 0.2s;
  }
  .chore-textarea:focus { border-color: #7B5EA7; }
  .submit-btn {
    margin-top: 10px;
    width: 100%;
    background: linear-gradient(135deg, #7B5EA7, #5B8FD4);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 12px;
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .submit-btn:active { transform: scale(0.97); opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .ai-feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 14px;
    font-size: 0.88rem;
    font-weight: 700;
    display: none;
    animation: fadeSlide 0.4s ease;
  }
  @keyframes fadeSlide {
    from { opacity:0; transform: translateY(-6px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .ai-feedback.done    { background:#E8FFF2; color:#1A7A45; display:block; }
  .ai-feedback.partial { background:#FFFBE8; color:#9A7200; display:block; }
  .ai-feedback.not-done{ background:#FFF0EC; color:#C0401A; display:block; }
  .ai-feedback .feedback-icon { font-size: 1.1rem; margin-right: 6px; }

  .loading-dots {
    display: inline-flex; gap: 4px; align-items: center;
  }
  .loading-dots span {
    width: 7px; height: 7px; background: white; border-radius: 50%;
    animation: bounce 1s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform:translateY(0); }
    40% { transform:translateY(-6px); }
  }

  /* SETTINGS */
  .settings-btn {
    position: fixed;
    bottom: 20px; right: 20px;
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #7B5EA7, #5B8FD4);
    border-radius: 50%;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(91,75,167,0.35);
    z-index: 100;
    -webkit-tap-highlight-color: transparent;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 32px 32px 0 0;
    padding: 28px 24px 40px;
    width: 100%;
    max-width: 600px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.35s cubic-bezier(0.34,1.2,0.64,1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .modal-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 20px;
  }
  .setting-group { margin-bottom: 20px; }
  .setting-label {
    font-weight: 800;
    font-size: 0.88rem;
    color: #7B5EA7;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .setting-input {
    width: 100%;
    border: 2px solid #E0D9F5;
    border-radius: 14px;
    padding: 12px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--dark);
    outline: none;
    background: #FAFAFF;
  }
  .setting-input:focus { border-color: #7B5EA7; }

  .chore-editor { display: flex; flex-direction: column; gap: 10px; }
  .chore-edit-row {
    display: flex; gap: 8px; align-items: center;
  }
  .chore-edit-emoji {
    width: 48px; flex-shrink: 0;
    border: 2px solid #E0D9F5;
    border-radius: 12px;
    padding: 10px 6px;
    font-size: 1.2rem;
    text-align: center;
    font-family: 'Nunito', sans-serif;
    outline: none; background: #FAFAFF;
  }
  .chore-edit-name {
    flex: 1;
    border: 2px solid #E0D9F5;
    border-radius: 12px;
    padding: 10px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--dark);
    outline: none; background: #FAFAFF;
  }
  .remove-btn {
    width: 36px; height: 36px; flex-shrink: 0;
    background: #FFF0EC; border: none; border-radius: 10px;
    color: #FF8B6A; font-size: 1.1rem; cursor: pointer;
  }
  .add-chore-btn {
    background: #F0EBF8; border: 2px dashed #C89FE8;
    border-radius: 14px; padding: 12px;
    font-family: 'Baloo 2', cursive; font-weight: 700;
    color: #7B5EA7; font-size: 0.95rem; cursor: pointer; width: 100%;
  }
  .save-btn {
    width: 100%; margin-top: 20px;
    background: linear-gradient(135deg, #7B5EA7, #5B8FD4);
    color: white; border: none; border-radius: 16px;
    padding: 16px; font-family: 'Baloo 2', cursive;
    font-size: 1.1rem; font-weight: 800; cursor: pointer;
  }
  .close-modal-btn {
    width: 100%; margin-top: 10px;
    background: #F5F5F5; color: #888; border: none;
    border-radius: 16px; padding: 14px;
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: 0.95rem; cursor: pointer;
  }

  /* PARENT APPROVAL MODAL */
  .approval-overlay {
    position: fixed; inset: 0;
    background: rgba(20,10,40,0.55);
    z-index: 250;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }
  .approval-overlay.open { display: flex; }
  .approval-card {
    background: white;
    border-radius: 32px;
    padding: 32px 28px 28px;
    width: 100%; max-width: 340px;
    text-align: center;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .approval-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #FFF3E0, #FFE0B2);
    border: 2px solid #FFB74D;
    color: #E65100;
    font-size: 0.78rem;
    font-weight: 800;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 16px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .approval-chore-emoji {
    font-size: 3.5rem;
    margin-bottom: 8px;
    display: block;
    animation: gentleBounce 1.5s ease-in-out infinite;
  }
  @keyframes gentleBounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }
  .approval-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 6px;
  }
  .approval-child-says {
    background: #F5F0FF;
    border-left: 4px solid #C89FE8;
    border-radius: 0 12px 12px 0;
    padding: 10px 14px;
    margin: 14px 0;
    text-align: left;
    font-size: 0.88rem;
    font-weight: 700;
    color: #5B4080;
    font-style: italic;
  }
  .approval-ai-verdict {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 12px;
    margin-bottom: 18px;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .approval-ai-verdict.done     { background: #E8FFF2; color: #1A7A45; }
  .approval-ai-verdict.partial  { background: #FFFBE8; color: #9A7200; }
  .approval-ai-verdict.not-done { background: #FFF0EC; color: #C0401A; }
  .approval-ai-verdict .verdict-icon { font-size: 1.2rem; flex-shrink: 0; }
  .approval-question {
    font-size: 0.95rem;
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 16px;
  }
  .approval-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .approve-btn {
    background: linear-gradient(135deg, #6EDFA0, #38C172);
    color: white; border: none;
    border-radius: 16px; padding: 14px 10px;
    font-family: 'Baloo 2', cursive;
    font-size: 1rem; font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(56,193,114,0.35);
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .approve-btn:active { transform: scale(0.96); }
  .reject-btn {
    background: linear-gradient(135deg, #FF8B6A, #E05A3A);
    color: white; border: none;
    border-radius: 16px; padding: 14px 10px;
    font-family: 'Baloo 2', cursive;
    font-size: 1rem; font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(224,90,58,0.3);
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .reject-btn:active { transform: scale(0.96); }

  /* PENDING APPROVAL state on chore card */
  .chore-card.pending {
    border-color: #FFB74D;
    background: linear-gradient(135deg, #FFFBF0, #FFFFFF);
  }
  .pending-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    background: linear-gradient(135deg, #FFF3E0, #FFE0B2);
    border: 1.5px solid #FFB74D;
    color: #E65100;
    font-size: 0.72rem;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    animation: pendingPulse 2s ease-in-out infinite;
  }
  @keyframes pendingPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,183,77,0.4); }
    50%      { box-shadow: 0 0 0 6px rgba(255,183,77,0); }
  }
  .approved-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    background: #E8FFF2;
    border: 1.5px solid #6EDFA0;
    color: #1A7A45;
    font-size: 0.72rem;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 12px;
  }

  /* CELEBRATION */
  .celebration-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .celebration-overlay.show { display: flex; }
  .celebration-card {
    background: white;
    border-radius: 32px;
    padding: 40px 32px;
    text-align: center;
    max-width: 320px;
    width: 90%;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .celebration-emoji { font-size: 4rem; }
  .celebration-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--dark);
    margin: 12px 0 8px;
  }
  .celebration-text {
    font-size: 1rem;
    font-weight: 700;
    color: #777;
    margin-bottom: 20px;
  }
  .celebration-btn {
    background: linear-gradient(135deg, #FFD93D, #FF8B6A);
    color: white;
    border: none; border-radius: 16px;
    padding: 14px 32px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem; font-weight: 800;
    cursor: pointer; width: 100%;
  }

  /* CONFETTI */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    top: -10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    pointer-events: none;
    z-index: 400;
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* SECOND FAB */
  .settings-btn { transition: transform 0.15s; }
  .settings-btn:active { transform: scale(0.93); }

  /* PLANNER SCREEN */
  .planner-overlay {
    position: fixed; inset: 0;
    background: linear-gradient(160deg, #B8E4FF 0%, #D4F5E4 50%, #FFE8D6 100%);
    z-index: 180;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .planner-overlay.open { display: flex; }

  .planner-header {
    background: linear-gradient(135deg, #5B8FD4 0%, #7B5EA7 100%);
    padding: 20px 20px 24px;
    display: flex; align-items: center; gap: 14px;
    border-radius: 0 0 28px 28px;
    box-shadow: 0 6px 20px rgba(91,75,167,0.2);
    flex-shrink: 0;
  }
  .planner-back {
    background: rgba(255,255,255,0.2);
    border: none; border-radius: 12px;
    width: 40px; height: 40px;
    font-size: 1.2rem; cursor: pointer; color: white;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .planner-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.4rem; font-weight: 800;
    color: white;
    text-shadow: 1px 2px 0 rgba(0,0,0,0.12);
  }
  .planner-subtitle {
    font-size: 0.8rem; font-weight: 600;
    color: rgba(255,255,255,0.8);
    margin-top: 1px;
  }

  .planner-body { flex: 1; overflow-y: auto; padding: 16px; }

  /* Day tabs */
  .day-tabs {
    display: flex; gap: 6px; overflow-x: auto;
    padding-bottom: 4px; margin-bottom: 16px;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    background: white;
    border: 2.5px solid transparent;
    border-radius: 14px;
    padding: 8px 14px;
    font-family: 'Baloo 2', cursive;
    font-size: 0.85rem; font-weight: 700;
    color: #888; cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    text-align: center; min-width: 64px;
  }
  .day-tab.active {
    border-color: #7B5EA7;
    color: #7B5EA7;
    background: #F5F0FF;
    box-shadow: 0 2px 8px rgba(123,94,167,0.2);
  }
  .day-tab .tab-label { display: block; font-size: 0.7rem; font-weight: 600; color: inherit; margin-top: 1px; }
  .day-tab.has-override .override-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #FF8B6A; margin: 3px auto 0;
  }
  .override-dot { display: none; }
  .has-override .override-dot { display: block; }

  /* Planner card */
  .planner-card {
    background: white;
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    margin-bottom: 14px;
  }
  .planner-card-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem; font-weight: 800;
    color: var(--dark); margin-bottom: 4px;
  }
  .planner-card-sub {
    font-size: 0.78rem; font-weight: 600; color: #999;
    margin-bottom: 14px;
  }
  .override-toggle {
    display: flex; align-items: center;
    justify-content: space-between;
    background: #F5F0FF;
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .override-toggle-label {
    font-size: 0.88rem; font-weight: 700; color: #7B5EA7;
  }
  .toggle-pill {
    width: 44px; height: 24px;
    background: #DDD; border-radius: 12px;
    position: relative; transition: background 0.2s; flex-shrink: 0;
  }
  .toggle-pill.on { background: #7B5EA7; }
  .toggle-pill::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    background: white; border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .toggle-pill.on::after { transform: translateX(20px); }

  /* Chore library checklist */
  .chore-checklist { display: flex; flex-direction: column; gap: 8px; }
  .chore-check-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border: 2px solid #EEE;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .chore-check-row.checked {
    border-color: #7B5EA7;
    background: #F5F0FF;
  }
  .chore-check-box {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2.5px solid #DDD;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; flex-shrink: 0;
    transition: all 0.2s;
  }
  .chore-check-row.checked .chore-check-box {
    background: #7B5EA7; border-color: #7B5EA7; color: white;
  }
  .chore-check-emoji { font-size: 1.3rem; }
  .chore-check-name { font-weight: 700; font-size: 0.9rem; flex: 1; }

  /* Library editor */
  .library-editor { display: flex; flex-direction: column; gap: 8px; }
  .library-row {
    display: flex; gap: 8px; align-items: center;
  }
  .lib-emoji-input {
    width: 46px; flex-shrink: 0;
    border: 2px solid #E0D9F5; border-radius: 12px;
    padding: 9px 4px; font-size: 1.2rem;
    text-align: center; font-family: 'Nunito', sans-serif;
    outline: none; background: #FAFAFF;
  }
  .lib-name-input {
    flex: 1; border: 2px solid #E0D9F5; border-radius: 12px;
    padding: 9px 12px; font-family: 'Nunito', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    color: var(--dark); outline: none; background: #FAFAFF;
  }
  .lib-remove-btn {
    width: 34px; height: 34px; flex-shrink: 0;
    background: #FFF0EC; border: none; border-radius: 10px;
    color: #FF8B6A; font-size: 1rem; cursor: pointer;
  }
  .add-lib-btn {
    background: #F0EBF8; border: 2px dashed #C89FE8;
    border-radius: 14px; padding: 11px;
    font-family: 'Baloo 2', cursive; font-weight: 700;
    color: #7B5EA7; font-size: 0.9rem;
    cursor: pointer; width: 100%; margin-top: 4px;
  }
  .planner-save-btn {
    width: 100%; margin-top: 8px;
    background: linear-gradient(135deg, #7B5EA7, #5B8FD4);
    color: white; border: none; border-radius: 16px;
    padding: 15px; font-family: 'Baloo 2', cursive;
    font-size: 1.05rem; font-weight: 800; cursor: pointer;
    box-shadow: 0 4px 14px rgba(123,94,167,0.3);
  }

  /* API KEY NOTICE */
  .api-notice {
    margin: 16px;
    background: linear-gradient(135deg, #FFF5D6, #FFE8D6);
    border: 2px solid #FFD93D;
    border-radius: 16px;
    padding: 14px 16px;
    font-size: 0.82rem;
    font-weight: 700;
    color: #8A6200;
    display: none;
  }
  .api-notice a { color: #7B5EA7; }

  /* DEDUCTION BUTTON */
  .deduct-btn {
    margin-top: 12px;
    width: 100%;
    background: linear-gradient(135deg, #FFF0EC, #FFE4DE);
    border: 2px solid #FFBFAA;
    border-radius: 16px;
    padding: 11px 16px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.2s;
  }
  .deduct-btn:active { transform: scale(0.98); }
  .deduct-btn-icon { font-size: 1.3rem; }
  .deduct-btn-text { flex: 1; text-align: left; }
  .deduct-btn-title { font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 0.92rem; color: #C04020; }
  .deduct-btn-sub { font-size: 0.72rem; font-weight: 600; color: #E08070; margin-top: 1px; }

  /* DEDUCTION HISTORY */
  .deduction-log {
    margin-top: 10px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .deduction-entry {
    background: linear-gradient(135deg, #FFF5F2, #FFF0EC);
    border: 1.5px solid #FFCFC4;
    border-radius: 12px;
    padding: 9px 13px;
    display: flex; align-items: center; gap: 10px;
    animation: fadeSlide 0.3s ease;
  }
  .deduction-entry-marbles {
    background: linear-gradient(135deg, #FF8B6A, #E05A3A);
    color: white; font-family: 'Baloo 2', cursive;
    font-weight: 800; font-size: 0.88rem;
    padding: 3px 9px; border-radius: 10px; flex-shrink: 0;
  }
  .deduction-entry-reason {
    font-size: 0.8rem; font-weight: 700; color: #8A4030; flex: 1;
  }
  .deduction-entry-date {
    font-size: 0.68rem; font-weight: 600; color: #BBB; flex-shrink: 0;
  }

  /* DEDUCTION MODAL */
  .deduct-overlay {
    position: fixed; inset: 0;
    background: rgba(20,10,40,0.55);
    z-index: 260;
    display: none; align-items: center;
    justify-content: center; padding: 24px;
    backdrop-filter: blur(4px);
  }
  .deduct-overlay.open { display: flex; }
  .deduct-card {
    background: white; border-radius: 32px;
    padding: 28px 24px 24px;
    width: 100%; max-width: 340px;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .deduct-card-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.3rem; font-weight: 800;
    color: var(--dark); margin-bottom: 4px;
  }
  .deduct-card-sub {
    font-size: 0.82rem; font-weight: 600;
    color: #999; margin-bottom: 20px;
  }
  .deduct-label {
    font-size: 0.8rem; font-weight: 800;
    color: #C04020; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .deduct-amount-row {
    display: flex; align-items: center;
    gap: 0; margin-bottom: 18px;
    background: #FFF5F2; border-radius: 16px;
    border: 2px solid #FFCFC4; overflow: hidden;
  }
  .deduct-minus, .deduct-plus {
    width: 48px; height: 48px; border: none;
    background: transparent; font-size: 1.5rem;
    font-weight: 800; cursor: pointer; color: #C04020;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .deduct-minus:active, .deduct-plus:active { background: #FFE4DE; }
  .deduct-amount-val {
    flex: 1; text-align: center;
    font-family: 'Baloo 2', cursive;
    font-size: 1.6rem; font-weight: 800; color: #C04020;
  }
  .deduct-reason-input {
    width: 100%; border: 2px solid #E0D9F5;
    border-radius: 14px; padding: 12px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    color: var(--dark); outline: none;
    background: #FAFAFF; margin-bottom: 18px;
    resize: none; height: 72px;
  }
  .deduct-reason-input:focus { border-color: #FF8B6A; }
  .deduct-confirm-btn {
    width: 100%; background: linear-gradient(135deg, #FF8B6A, #E05A3A);
    color: white; border: none; border-radius: 16px;
    padding: 14px; font-family: 'Baloo 2', cursive;
    font-size: 1rem; font-weight: 800; cursor: pointer;
    box-shadow: 0 4px 14px rgba(224,90,58,0.3);
    margin-bottom: 10px;
  }
  .deduct-cancel-btn {
    width: 100%; background: #F5F5F5; color: #888;
    border: none; border-radius: 16px; padding: 13px;
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: 0.95rem; cursor: pointer;
  }

  /* Marble removal animation */
  @keyframes marbleEject {
    0%   { transform: scale(1) translateY(0); opacity: 1; }
    40%  { transform: scale(1.2) translateY(-12px); opacity: 1; }
    100% { transform: scale(0) translateY(40px); opacity: 0; }
  }

</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="stars-decoration-left">✨🌟</div>
  <div class="stars-decoration">🌟✨</div>
  <h1 id="appTitle">My Chore Chart</h1>
  <div class="subtitle" id="appSubtitle">Let's earn some marbles today! 🎉</div>
</div>

<!-- API KEY NOTICE -->
<div class="api-notice" id="apiNotice">
  ⚠️ To enable AI marking, add your Anthropic API key in ⚙️ Settings below.
  Get one free at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
</div>

<!-- MARBLE JAR -->
<div class="marble-section" style="margin-top:20px">
  <div class="marble-header">
    <div class="marble-title">🫙 Marble Jar</div>
    <div class="marble-count-badge" id="marbleCountBadge"><span id="marbleCount">0</span> marbles</div>
  </div>
  <div class="jar-container">
    <div class="jar-canvas-wrap">
      <canvas id="jarCanvas" width="260" height="360"></canvas>
    </div>
    <div class="goal-info">
      <div class="goal-bar-track">
        <div class="goal-bar-fill" id="goalBar" style="width:0%"></div>
      </div>
      <div class="goal-text"><span id="marbleCountText">0</span> / <span id="goalText">20</span> marbles to prize! 🏆</div>
    </div>
  </div>
  <div class="prize-box">
    <div class="prize-emoji">🎁</div>
    <div>
      <div class="prize-text">Prize when you reach <span id="prizeGoalText">20</span> marbles:</div>
      <div class="prize-name" id="prizeName">Set your prize in Settings ⚙️</div>
    </div>
  </div>

  <!-- Deduct button -->
  <button class="deduct-btn" onclick="openDeductModal()">
    <div class="deduct-btn-icon">😤</div>
    <div class="deduct-btn-text">
      <div class="deduct-btn-title">Take away marbles</div>
      <div class="deduct-btn-sub">Parent use only — tap to deduct marbles</div>
    </div>
    <div style="color:#FFBFAA;font-size:1.1rem;">›</div>
  </button>

  <!-- Deduction history -->
  <div class="deduction-log" id="deductionLog"></div>
</div>

<!-- DATE + ALL DONE BADGE -->
<div class="date-bar">
  <div class="date-label" id="todayDate"></div>
  <div class="all-done-badge" id="allDoneBadge">⭐ All done! Marble earned!</div>
</div>

<!-- CHORES LIST -->
<div class="chores-list" id="choresList"></div>

<!-- SETTINGS BUTTON -->
<button class="settings-btn" onclick="openPlanner()" style="right:80px">📅</button>
<button class="settings-btn" onclick="openSettings()">⚙️</button>

<!-- CHORE PLANNER SCREEN -->
<div class="planner-overlay" id="plannerScreen">
  <div class="planner-header">
    <button class="planner-back" onclick="closePlanner()">←</button>
    <div>
      <div class="planner-title">📅 Chore Planner</div>
      <div class="planner-subtitle">Set chores for each day of the week</div>
    </div>
  </div>
  <div class="planner-body" id="plannerBody">
    <!-- Rendered by JS -->
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal" onclick="handleModalClick(event)">
  <div class="modal">
    <div class="modal-title">⚙️ Settings</div>

    <div class="setting-group">
      <div class="setting-label">Child's Name</div>
      <input class="setting-input" id="settingName" placeholder="e.g. Sophie" />
    </div>

    <div class="setting-group">
      <div class="setting-label">App Title</div>
      <input class="setting-input" id="settingTitle" placeholder="e.g. Sophie's Chore Chart" />
    </div>

    <div class="setting-group">
      <div class="setting-label">Marble Goal (number of marbles for prize)</div>
      <input class="setting-input" id="settingGoal" type="number" min="1" max="100" placeholder="e.g. 20" />
    </div>

    <div class="setting-group">
      <div class="setting-label">🏆 Prize Name</div>
      <input class="setting-input" id="settingPrize" placeholder="e.g. Trip to the cinema!" />
    </div>

    <div class="setting-group">
      <div class="setting-label">🔑 Anthropic API Key (for AI marking)</div>
      <input class="setting-input" id="settingApiKey" type="password" placeholder="sk-ant-..." />
    </div>

    <div class="setting-group">
      <div class="setting-label">📅 Chore Schedule</div>
      <button class="add-chore-btn" style="width:100%;padding:14px;font-size:0.95rem;" onclick="closeSettings(); openPlanner()">
        📅 Open Chore Planner →
      </button>

    <button class="save-btn" onclick="saveSettings()">💾 Save & Update</button>

<!-- PARENT APPROVAL MODAL -->
<div class="approval-overlay" id="approvalOverlay">
  <div class="approval-card">
    <div class="approval-badge">👨‍👩‍👧 Parent Check</div>
    <span class="approval-chore-emoji" id="approvalEmoji">🛏️</span>
    <div class="approval-title" id="approvalChoreName">Make your bed</div>
    <div class="approval-child-says" id="approvalChildSays">"I made my bed!"</div>
    <div class="approval-ai-verdict done" id="approvalVerdict">
      <span class="verdict-icon">🤖</span>
      <span id="approvalVerdictText">AI says: looks great!</span>
    </div>
    <div class="approval-question">Do you confirm this is done? ✅</div>
    <div class="approval-btns">
      <button class="approve-btn" onclick="parentDecision(true)">👍 Yes, approved!</button>
      <button class="reject-btn" onclick="parentDecision(false)">👎 Not quite yet</button>
    </div>
  </div>
</div>

<!-- DEDUCTION MODAL -->
<div class="deduct-overlay" id="deductOverlay" onclick="handleDeductOverlayClick(event)">
  <div class="deduct-card">
    <div class="deduct-card-title">😤 Take Away Marbles</div>
    <div class="deduct-card-sub">This is for parents only — explain why so <span id="deductChildName">your child</span> understands</div>

    <div class="deduct-label">How many marbles?</div>
    <div class="deduct-amount-row">
      <button class="deduct-minus" onclick="changeDeductAmount(-1)">−</button>
      <div class="deduct-amount-val" id="deductAmountVal">1</div>
      <button class="deduct-plus" onclick="changeDeductAmount(1)">+</button>
    </div>

    <div class="deduct-label">Reason (your child will see this)</div>
    <textarea class="deduct-reason-input" id="deductReason" placeholder="e.g. Not listening at bedtime, being unkind to your sister…"></textarea>

    <button class="deduct-confirm-btn" onclick="confirmDeduction()">😤 Take Away Marbles</button>
    <button class="deduct-cancel-btn" onclick="closeDeductModal()">Cancel</button>

</div>

<!-- CELEBRATION MODAL -->
<div class="celebration-overlay" id="celebrationOverlay">
  <div class="celebration-card">
    <div class="celebration-emoji" id="celebEmoji">🎉</div>
    <div class="celebration-title" id="celebTitle">Amazing!</div>
    <div class="celebration-text" id="celebText">You earned a marble!</div>
    <button class="celebration-btn" id="celebBtn" onclick="closeCelebration()">Yay! 🎊</button>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  name: '',
  title: 'My Chore Chart',
  apiKey: '',
  marbles: 0,
  goal: 20,
  prize: '',

  // Master chore library — all possible chores
  choreLibrary: [
    { id: 'c1', emoji: '🛏️', name: 'Make your bed' },
    { id: 'c2', emoji: '🍽️', name: 'Clear the table' },
    { id: 'c3', emoji: '🧹', name: 'Tidy your room' },
    { id: 'c4', emoji: '🦷', name: 'Brush teeth' },
    { id: 'c5', emoji: '🎒', name: 'Pack school bag' },
  ],

  // Schedule: weekday template + per-day overrides
  // Each value is an array of chore IDs, or null (= use weekday template)
  weekdayTemplate: ['c1','c2','c4','c5'],  // Mon–Fri default
  dayOverrides: {
    // 0=Sun,1=Mon,...,6=Sat  — null means "use weekday template"
    0: ['c1','c2','c3','c4'],   // Sunday
    1: null, 2: null, 3: null, 4: null, 5: null,
    6: ['c1','c2','c3','c4'],   // Saturday
  },

  // today's results: { choreId: 'done'|'partial'|'not-done' }
  todayResults: {},
  pendingApprovals: {},
  todayFeedback: {},
  todayDate: '',
  marbleEarnedToday: false,
  deductionLog: [], // [{ amount, reason, date }]
};

function todayKey() {
  return new Date().toISOString().slice(0,10);
}

function loadState() {
  try {
    const saved = localStorage.getItem('choreTrackerState');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
    }
  } catch(e) {}
  // Reset daily results if new day
  const today = todayKey();
  if (state.todayDate !== today) {
    state.todayResults = {};
    state.pendingApprovals = {};
    state.todayDate = today;
    state.marbleEarnedToday = false;
    saveState();
  }
}

function saveState() {
  try { localStorage.setItem('choreTrackerState', JSON.stringify(state)); } catch(e) {}
}

// Returns the array of chore objects active today
function getTodaysChores() {
  const dow = new Date().getDay(); // 0=Sun … 6=Sat
  const ids = (state.dayOverrides[dow] !== null && state.dayOverrides[dow] !== undefined)
    ? state.dayOverrides[dow]
    : state.weekdayTemplate;
  return ids.map(id => state.choreLibrary.find(c => c.id === id)).filter(Boolean);
}

// Generate a unique chore id
function newChoreId() {
  return 'c' + Date.now() + Math.floor(Math.random()*1000);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('appTitle').textContent = state.title || 'My Chore Chart';
  const name = state.name ? state.name + "'s" : 'Your';
  document.getElementById('appSubtitle').textContent = `Let's earn some marbles today! 🎉`;
  if (state.name) document.getElementById('appSubtitle').textContent = `Go ${state.name}! Let's earn some marbles! 🎉`;

  // API notice
  document.getElementById('apiNotice').style.display = state.apiKey ? 'none' : 'block';

  // Marble jar — sync canvas
  document.getElementById('marbleCount').textContent = state.marbles;
  document.getElementById('marbleCountText').textContent = state.marbles;
  document.getElementById('goalText').textContent = state.goal;
  document.getElementById('prizeGoalText').textContent = state.goal;
  document.getElementById('prizeName').textContent = state.prize || 'Set your prize in Settings ⚙️';
  const pct = Math.min(100, (state.marbles / state.goal) * 100);
  document.getElementById('goalBar').style.width = pct + '%';
  if (JAR.canvas) JAR.reset(state.marbles); else setTimeout(() => JAR.init(), 50);

  // Date
  const now = new Date();
  const opts = { weekday:'long', day:'numeric', month:'long' };
  document.getElementById('todayDate').textContent = now.toLocaleDateString('en-GB', opts);

  renderChores();
  checkAllDone();
  renderDeductionLog();
}

// ─── SOUND ENGINE ────────────────────────────────────────────────────────────
const SFX = {
  ctx: null,

  init() {
    if (this.ctx) return;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  },

  // Resume context (required after user gesture on iOS/Safari)
  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },

  // Master gain helper
  masterGain(vol = 0.5) {
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(vol, this.ctx.currentTime);
    g.connect(this.ctx.destination);
    return g;
  },

  // Marble clink — short bright ping with fast decay
  marbleClink() {
    if (!this.ctx) return;
    this.resume();
    const t = this.ctx.currentTime;
    const master = this.masterGain(0.38);

    // Primary ping
    const osc = this.ctx.createOscillator();
    const env = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1480, t);
    osc.frequency.exponentialRampToValueAtTime(900, t + 0.12);
    env.gain.setValueAtTime(0.9, t);
    env.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    osc.connect(env); env.connect(master);
    osc.start(t); osc.stop(t + 0.25);

    // Subtle overtone
    const osc2 = this.ctx.createOscillator();
    const env2 = this.ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(2960, t);
    osc2.frequency.exponentialRampToValueAtTime(1800, t + 0.08);
    env2.gain.setValueAtTime(0.35, t);
    env2.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    osc2.connect(env2); env2.connect(master);
    osc2.start(t); osc2.stop(t + 0.15);

    // Bounce thud (low thump)
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.06, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 3);
    const noise = this.ctx.createBufferSource();
    const noiseEnv = this.ctx.createGain();
    const noiseFilter = this.ctx.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.value = 320;
    noiseFilter.Q.value = 1.2;
    noise.buffer = buf;
    noiseEnv.gain.setValueAtTime(0.55, t + 0.01);
    noiseEnv.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
    noise.connect(noiseFilter); noiseFilter.connect(noiseEnv); noiseEnv.connect(master);
    noise.start(t + 0.01);
  },

  // Marble rolling/settling — soft rattle sequence
  marbleSettle() {
    if (!this.ctx) return;
    this.resume();
    const offsets = [0, 0.07, 0.13, 0.18, 0.22];
    const freqs   = [1100, 980, 870, 780, 700];
    offsets.forEach((delay, idx) => {
      const t = this.ctx.currentTime + delay;
      const osc = this.ctx.createOscillator();
      const env = this.ctx.createGain();
      const vol = 0.25 * Math.pow(0.65, idx);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freqs[idx], t);
      osc.frequency.exponentialRampToValueAtTime(freqs[idx] * 0.75, t + 0.06);
      env.gain.setValueAtTime(vol, t);
      env.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      osc.connect(env); env.connect(this.ctx.destination);
      osc.start(t); osc.stop(t + 0.1);
    });
  },

  // Approval chime — warm two-note chime
  approvalChime() {
    if (!this.ctx) return;
    this.resume();
    const master = this.masterGain(0.4);
    [[0, 523.25], [0.15, 659.25], [0.3, 783.99]].forEach(([delay, freq]) => {
      const t = this.ctx.currentTime + delay;
      const osc = this.ctx.createOscillator();
      const env = this.ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, t);
      env.gain.setValueAtTime(0.7, t);
      env.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.connect(env); env.connect(master);
      osc.start(t); osc.stop(t + 0.55);
    });
  },

  // Celebration fanfare — upward arpeggio + shimmer
  celebrate() {
    if (!this.ctx) return;
    this.resume();
    const master = this.masterGain(0.45);

    // Bright arpeggio
    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
    notes.forEach((freq, idx) => {
      const t = this.ctx.currentTime + idx * 0.11;
      const osc = this.ctx.createOscillator();
      const env = this.ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, t);
      env.gain.setValueAtTime(0.65, t);
      env.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.connect(env); env.connect(master);
      osc.start(t); osc.stop(t + 0.5);
    });

    // Shimmer overtones
    [1047, 1319, 1568].forEach((freq, idx) => {
      const t = this.ctx.currentTime + 0.55 + idx * 0.08;
      const osc = this.ctx.createOscillator();
      const env = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      env.gain.setValueAtTime(0.3, t);
      env.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      osc.connect(env); env.connect(master);
      osc.start(t); osc.stop(t + 0.65);
    });

  // Prize fanfare — extra flourish if goal reached
    if (state.marbles >= state.goal) {
      const prizeNotes = [523, 659, 784, 1047, 784, 1047, 1319];
      prizeNotes.forEach((freq, idx) => {
        const t = this.ctx.currentTime + 1.1 + idx * 0.1;
        const osc = this.ctx.createOscillator();
        const env = this.ctx.createGain();
        osc.type = 'square';
        const g2 = this.ctx.createGain();
        g2.gain.setValueAtTime(0.08, t); // square needs lower vol
        osc.frequency.setValueAtTime(freq, t);
        env.gain.setValueAtTime(1, t);
        env.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        osc.connect(env); env.connect(g2); g2.connect(this.ctx.destination);
        osc.start(t); osc.stop(t + 0.3);
      });
    }
  },

  // Sad descending tone — marble taken away
  deductSound() {
    if (!this.ctx) return;
    this.resume();
    const master = this.masterGain(0.35);
    [[0, 523], [0.13, 415], [0.26, 349], [0.42, 294]].forEach(([delay, freq]) => {
      const t = this.ctx.currentTime + delay;
      const osc = this.ctx.createOscillator();
      const env = this.ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.88, t + 0.18);
      env.gain.setValueAtTime(0.6, t);
      env.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      osc.connect(env); env.connect(master);
      osc.start(t); osc.stop(t + 0.25);
    });
    const t2 = this.ctx.currentTime + 0.55;
    const osc2 = this.ctx.createOscillator();
    const env2 = this.ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(110, t2);
    osc2.frequency.exponentialRampToValueAtTime(60, t2 + 0.3);
    env2.gain.setValueAtTime(0.5, t2);
    env2.gain.exponentialRampToValueAtTime(0.001, t2 + 0.35);
    osc2.connect(env2); env2.connect(master);
    osc2.start(t2); osc2.stop(t2 + 0.4);
  },
};

const JAR = {
  canvas: null, ctx: null,
  W: 260, H: 360,
  // jar geometry (in canvas px)
  jarX: 30, jarY: 40, jarW: 200, jarH: 290, jarR: 22,
  lidH: 28,
  marbles: [],       // settled marbles
  dropping: [],      // marbles currently animating downward
  animFrame: null,
  colors: [
    ['#C89FE8','#E8CFFF','#A07BC8'],
    ['#6EC6F5','#ADE4FF','#4A9FD4'],
    ['#6EDFA0','#AEFFCC','#3EB87A'],
    ['#FFD93D','#FFF0A0','#D4A800'],
    ['#FF8B6A','#FFBFAA','#D45A38'],
    ['#FF8BCC','#FFBFE8','#D45AA0'],
    ['#F5A623','#FFD080','#C07A00'],
    ['#7ED9F5','#BFEFFF','#4AADCC'],
  ],

  init() {
    this.canvas = document.getElementById('jarCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.buildMarbles(state.marbles);
    this.draw();
  },

  buildMarbles(count) {
    this.marbles = [];
    const R = 13;
    const cols = Math.floor((this.jarW - 20) / (R * 2 + 4));
    for (let i = 0; i < Math.min(count, 60); i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = this.jarX + 14 + col * (R * 2 + 4) + R;
      const bottomY = this.jarY + this.jarH - 12 - R;
      const y = bottomY - row * (R * 1.85);
      const ci = (i * 3 + row) % this.colors.length;
      this.marbles.push({ x, y, r: R, color: this.colors[ci], wobble: 0, wobbleV: 0 });
    }
  },

  dropMarble(onDone) {
    const R = 13;
    const cols = Math.floor((this.jarW - 20) / (R * 2 + 4));
    const i = this.marbles.length;
    const col = i % cols;
    const row = Math.floor(i / cols);
    const targetX = this.jarX + 14 + col * (R * 2 + 4) + R;
    const bottomY = this.jarY + this.jarH - 12 - R;
    const targetY = bottomY - row * (R * 1.85);
    const ci = (i * 3 + row) % this.colors.length;

    const drop = {
      x: targetX + (Math.random() - 0.5) * 10,
      y: this.jarY + this.lidH - 10,
      vy: 0,
      targetX, targetY,
      r: R,
      color: this.colors[ci],
      bounces: 0,
      settled: false,
      wobble: 0, wobbleV: 0,
      sparkles: [],
    };
    this.dropping.push(drop);
    this.startLoop();

    // Check settled in loop
    const check = setInterval(() => {
      if (drop.settled) {
        clearInterval(check);
        this.marbles.push({ x: drop.targetX, y: drop.targetY, r: R, color: drop.color, wobble: 0, wobbleV: 0 });
        this.dropping = this.dropping.filter(d => d !== drop);
        if (onDone) onDone();
      }
    }, 50);
  },

  startLoop() {
    if (this.animFrame) return;
    const loop = () => {
      this.update();
      this.draw();
      if (this.dropping.length > 0 || (this.ejecting && this.ejecting.length > 0) || this.marbles.some(m => Math.abs(m.wobble) > 0.01)) {
        this.animFrame = requestAnimationFrame(loop);
      } else {
        this.animFrame = null;
        this.draw(); // final clean draw
      }
    };
    this.animFrame = requestAnimationFrame(loop);
  },

  update() {
    const gravity = 1.1;
    const bounce = 0.38;
    this.dropping.forEach(d => {
      if (d.settled) return;
      d.vy += gravity;
      d.y += d.vy;

      // Bounce off bottom
      const floor = d.targetY;
      if (d.y >= floor) {
        d.y = floor;
        d.vy *= -bounce;
        d.bounces++;
        // Spawn sparkles on first bounce
        if (d.bounces === 1) {
          SFX.marbleClink();
          for (let i = 0; i < 6; i++) {
            d.sparkles.push({
              x: d.x, y: d.y,
              vx: (Math.random() - 0.5) * 4,
              vy: -Math.random() * 5 - 2,
              life: 1,
              color: d.color[0],
              r: Math.random() * 4 + 2,
            });
          }
        }
        if (Math.abs(d.vy) < 1.2) {
          d.vy = 0;
          d.y = floor;
          d.wobbleV = 0.3;
          d.settled = true;
          SFX.marbleSettle();
        }
      }
      // Wobble
      d.wobbleV -= d.wobble * 0.3;
      d.wobbleV *= 0.75;
      d.wobble += d.wobbleV;

      // Update sparkles
      d.sparkles.forEach(s => {
        s.x += s.vx; s.y += s.vy;
        s.vy += 0.3;
        s.life -= 0.07;
      });
      d.sparkles = d.sparkles.filter(s => s.life > 0);
    });

    // Wobble settled marbles
    this.marbles.forEach(m => {
      m.wobbleV -= m.wobble * 0.25;
      m.wobbleV *= 0.7;
      m.wobble += m.wobbleV;
    });

    // Eject animation
    if (this.ejecting) {
      this.ejecting.forEach(e => {
        e.vy += 0.7; // gravity pulls back
        e.x += e.vx;
        e.y += e.vy;
        e.life -= 0.045;
      });
      this.ejecting = this.ejecting.filter(e => e.life > 0);
    }
  },

  draw() {
    const { ctx, W, H, jarX, jarY, jarW, jarH, jarR, lidH } = this;
    ctx.clearRect(0, 0, W, H);

    // ── Jar body (glass) ──
    const bodyY = jarY + lidH;
    const bodyH = jarH - lidH;

    // Glass background
    ctx.save();
    this.roundRect(jarX, bodyY, jarW, bodyH, [0, 0, jarR, jarR]);
    ctx.fillStyle = '#D8EEFF';
    ctx.fill();
    ctx.restore();

    // Clip marbles to inside jar
    ctx.save();
    this.roundRect(jarX + 4, bodyY + 4, jarW - 8, bodyH - 8, [0, 0, jarR - 2, jarR - 2]);
    ctx.clip();

    // Draw settled marbles
    this.marbles.forEach(m => this.drawMarble(ctx, m.x, m.y, m.r, m.color, m.wobble));

    // Draw dropping marbles
    this.dropping.forEach(d => {
      if (!d.settled) {
        this.drawMarble(ctx, d.x, d.y, d.r, d.color, d.wobble);
        d.sparkles.forEach(s => {
          ctx.save();
          ctx.globalAlpha = s.life;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = s.color;
          ctx.fill();
          ctx.restore();
        });
      }
    });

    ctx.restore();

    // Draw ejecting marbles (outside clip — fly upward out of jar)
    if (this.ejecting) {
      this.ejecting.forEach(e => {
        ctx.save();
        ctx.globalAlpha = Math.max(0, e.life);
        this.drawMarble(ctx, e.x, e.y, e.r, e.color, 0);
        ctx.restore();
      });
    }

    // ── Glass overlay / shine ──
    ctx.save();
    this.roundRect(jarX, bodyY, jarW, bodyH, [0, 0, jarR, jarR]);
    ctx.strokeStyle = '#8BBDE8';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Left shine strip
    const shineGrad = ctx.createLinearGradient(jarX + 10, 0, jarX + 32, 0);
    shineGrad.addColorStop(0, 'rgba(255,255,255,0.55)');
    shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = shineGrad;
    ctx.beginPath();
    ctx.roundRect(jarX + 10, bodyY + 12, 20, bodyH - 24, 10);
    ctx.fill();

    // Right dim
    const dimGrad = ctx.createLinearGradient(jarX + jarW - 30, 0, jarX + jarW, 0);
    dimGrad.addColorStop(0, 'rgba(0,0,0,0)');
    dimGrad.addColorStop(1, 'rgba(0,40,80,0.1)');
    ctx.fillStyle = dimGrad;
    this.roundRect(jarX, bodyY, jarW, bodyH, [0, 0, jarR, jarR]);
    ctx.fill();
    ctx.restore();

    // ── Lid ──
    ctx.save();
    const lidGrad = ctx.createLinearGradient(jarX, jarY, jarX, jarY + lidH);
    lidGrad.addColorStop(0, '#9EC8F0');
    lidGrad.addColorStop(1, '#6A9FCC');
    ctx.fillStyle = lidGrad;
    this.roundRect(jarX - 6, jarY, jarW + 12, lidH, [jarR + 4, jarR + 4, 4, 4]);
    ctx.fill();
    ctx.strokeStyle = '#5A8AB8';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Lid shine
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.roundRect(jarX + 6, jarY + 5, jarW - 12, 8, 4);
    ctx.fill();

    // Knob on top
    const knobGrad = ctx.createRadialGradient(jarX + jarW/2 - 3, jarY - 6, 2, jarX + jarW/2, jarY - 4, 14);
    knobGrad.addColorStop(0, '#C0DDF5');
    knobGrad.addColorStop(1, '#6A9FCC');
    ctx.fillStyle = knobGrad;
    ctx.beginPath();
    ctx.ellipse(jarX + jarW/2, jarY - 4, 18, 11, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#5A8AB8';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();

    // ── Count label ──
    ctx.save();
    ctx.font = 'bold 28px "Baloo 2", cursive';
    ctx.fillStyle = 'rgba(44,42,74,0.18)';
    ctx.textAlign = 'center';
    ctx.fillText(state.marbles, jarX + jarW/2 + 1, jarY + jarH - 18 + 1);
    ctx.fillStyle = '#2D2A4A';
    ctx.fillText(state.marbles, jarX + jarW/2, jarY + jarH - 18);
    ctx.restore();
  },

  drawMarble(ctx, x, y, r, colors, wobble) {
    const scaleX = 1 + wobble * 0.15;
    const scaleY = 1 - wobble * 0.1;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scaleX, scaleY);

    // Shadow
    ctx.beginPath();
    ctx.ellipse(0, r * 0.85, r * 0.7, r * 0.25, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fill();

    // Base gradient
    const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.05, 0, 0, r);
    grad.addColorStop(0, colors[1]);
    grad.addColorStop(0.5, colors[0]);
    grad.addColorStop(1, colors[2]);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Swirl highlight
    ctx.save();
    ctx.clip();
    ctx.beginPath();
    ctx.arc(-r * 0.15, -r * 0.1, r * 0.55, 0.3, 2.2);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = r * 0.35;
    ctx.stroke();
    ctx.restore();

    // Top specular
    const spec = ctx.createRadialGradient(-r*0.35, -r*0.38, 0, -r*0.25, -r*0.3, r*0.48);
    spec.addColorStop(0, 'rgba(255,255,255,0.85)');
    spec.addColorStop(0.5, 'rgba(255,255,255,0.2)');
    spec.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = spec;
    ctx.fill();

    ctx.restore();
  },

  roundRect(x, y, w, h, radii) {
    this.ctx.beginPath();
    this.ctx.roundRect(x, y, w, h, radii);
  },

  triggerDrop(onDone) {
    this.dropMarble(onDone);
    this.startLoop();
  },

  removeMarbles(count, onDone) {
    // Pop marbles off the top one by one with a short delay between each
    const toRemove = Math.min(count, this.marbles.length);
    if (toRemove === 0) { if (onDone) onDone(); return; }

    let removed = 0;
    const removeOne = () => {
      if (this.marbles.length === 0) { if (onDone) onDone(); return; }
      // Eject the last marble with an upward animation
      const m = this.marbles[this.marbles.length - 1];
      this.ejecting = this.ejecting || [];
      this.ejecting.push({ ...m, vy: -14, vx: (Math.random()-0.5)*4, life: 1 });
      this.marbles.pop();
      removed++;
      this.startLoop();
      if (removed < toRemove) {
        setTimeout(removeOne, 120);
      } else {
        setTimeout(() => { if (onDone) onDone(); }, 400);
      }
    };
    removeOne();
  },

  reset(count) {
    if (this.animFrame) { cancelAnimationFrame(this.animFrame); this.animFrame = null; }
    this.dropping = [];
    this.buildMarbles(count);
    this.draw();
  }
};

function renderChores() {
  const list = document.getElementById('choresList');
  list.innerHTML = '';
  const chores = getTodaysChores();

  if (chores.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:32px 16px;color:#999;font-weight:700;">
      🎉 No chores today! Enjoy your day!<br>
      <span style="font-size:0.8rem;margin-top:8px;display:block;">Set up your schedule in the 📅 Chore Planner</span>
    </div>`;
    return;
  }

  chores.forEach((chore) => {
    const id = chore.id;
    const result = state.todayResults[id];
    const pending = state.pendingApprovals[id];
    const card = document.createElement('div');

    let cardClass = 'chore-card';
    if (result) cardClass += ` ${result}`;
    else if (pending) cardClass += ' pending';
    card.className = cardClass;
    card.dataset.id = id;

    let statusIcon = '⭕';
    if (result === 'done') statusIcon = '✅';
    else if (result === 'partial') statusIcon = '⚠️';
    else if (result === 'not-done') statusIcon = '❌';
    else if (pending) statusIcon = '⏳';

    let approvalTag = '';
    if (result === 'done') {
      approvalTag = `<div class="approved-tag">✅ Parent approved</div>`;
    } else if (pending) {
      approvalTag = `<div class="pending-tag" onclick="event.stopPropagation(); openApproval('${id}')">⏳ Waiting for parent tap</div>`;
    }

    card.innerHTML = `
      <div class="chore-top" onclick="toggleExpand('${id}')">
        <div class="chore-emoji">${chore.emoji}</div>
        <div class="chore-info">
          <div class="chore-name">${chore.name}</div>
          ${approvalTag}
        </div>
        <div class="chore-status-icon">${statusIcon}</div>
      </div>
      <div class="chore-expand">
        <div class="chore-expand-inner">
          <div class="expand-label">🗣️ Tell me what you did...</div>
          <textarea class="chore-textarea" id="textarea-${id}" placeholder="e.g. I made my bed and fluffed all the pillows!" ${result || pending ? 'disabled' : ''}>${pending?.description || ''}</textarea>
          <button class="submit-btn" id="submitBtn-${id}" onclick="markChore('${id}')" ${result || pending ? 'disabled' : ''}>
            ${result === 'done' ? '✅ Done & Approved!' : pending ? '⏳ Waiting for parent...' : '✨ Mark it!'}
          </button>
          <div class="ai-feedback ${result || pending?.aiResult || ''}" id="feedback-${id}" style="${result || pending ? 'display:block' : 'display:none'}">
            <span class="feedback-icon">${result === 'done' ? '🌟' : pending?.aiResult === 'partial' ? '💛' : pending ? '💪' : ''}</span>
            ${state.todayFeedback?.[id] || pending?.message || ''}
          </div>
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

function toggleExpand(id) {
  const card = document.querySelector(`.chore-card[data-id="${id}"]`);
  if (card) card.classList.toggle('expanded');
}

// ─── MARKING ─────────────────────────────────────────────────────────────────
async function markChore(id) {
  const textarea = document.getElementById(`textarea-${id}`);
  const btn = document.getElementById(`submitBtn-${id}`);
  const feedbackEl = document.getElementById(`feedback-${id}`);
  const description = textarea.value.trim();

  if (!description) {
    textarea.style.borderColor = '#FF8B6A';
    setTimeout(() => textarea.style.borderColor = '', 1000);
    return;
  }

  btn.disabled = true;
  btn.innerHTML = `<span class="loading-dots"><span></span><span></span><span></span></span>`;
  feedbackEl.className = 'ai-feedback';
  feedbackEl.style.display = 'none';

  const chore = state.choreLibrary.find(c => c.id === id);
  let result = 'done';
  let message = '';

  if (state.apiKey) {
    try {
      const choreName = chore?.name || id;
      const childName = state.name || 'the child';
      const prompt = `You are a fun, encouraging chore checker for a 9-year-old child named ${childName}.

The chore is: "${choreName}"
What they said they did: "${description}"

Based on their description, decide if the chore is:
- "done" = they clearly completed it
- "partial" = they did some of it but not fully
- "not-done" = they didn't do it or it's unclear

Reply ONLY in this JSON format (no other text):
{"result":"done|partial|not-done","message":"A short, fun, encouraging 1-2 sentence message for a 9-year-old. Be warm and emoji-filled! If partial or not done, gently say what's missing."}`;

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': state.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 200,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.content?.[0]?.text || '{}';
      const clean = text.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(clean);
      result = parsed.result || 'done';
      message = parsed.message || '';
    } catch(e) {
      result = 'done';
      message = "Great job! ⭐ (AI marking unavailable right now — check your API key)";
    }
  } else {
    result = 'done';
    message = `Well done for completing your chore! 🌟 (Add an API key in Settings for AI marking!)`;
  }

  // Save as PENDING — awaiting parent confirmation
  state.pendingApprovals[id] = { aiResult: result, message, description };
  if (!state.todayFeedback) state.todayFeedback = {};
  state.todayFeedback[id] = message;
  saveState();

  feedbackEl.className = `ai-feedback ${result}`;
  const faceIcon = result === 'done' ? '🌟' : result === 'partial' ? '💛' : '💪';
  feedbackEl.innerHTML = `<span class="feedback-icon">${faceIcon}</span>${message}`;
  feedbackEl.style.display = 'block';
  btn.disabled = true;
  btn.innerHTML = `⏳ Waiting for parent...`;

  renderChores();
  setTimeout(() => openApproval(id), 700);
}

// ─── PARENT APPROVAL ─────────────────────────────────────────────────────────
let currentApprovalId = null;

function openApproval(id) {
  const chore = state.choreLibrary.find(c => c.id === id);
  const pending = state.pendingApprovals[id];
  if (!pending || !chore) return;
  currentApprovalId = id;

  document.getElementById('approvalEmoji').textContent = chore.emoji;
  document.getElementById('approvalChoreName').textContent = chore.name;
  document.getElementById('approvalChildSays').textContent = `"${pending.description}"`;

  const verdictEl = document.getElementById('approvalVerdict');
  verdictEl.className = `approval-ai-verdict ${pending.aiResult}`;
  const labels = { done: 'AI says: looks complete! 🌟', partial: 'AI says: partially done ⚠️', 'not-done': 'AI says: not done yet ❌' };
  document.getElementById('approvalVerdictText').textContent = labels[pending.aiResult] || '';
  document.querySelector('#approvalVerdict .verdict-icon').textContent = '🤖';

  document.getElementById('approvalOverlay').classList.add('open');
}

function parentDecision(approved) {
  const id = currentApprovalId;
  if (!id) return;
  document.getElementById('approvalOverlay').classList.remove('open');

  if (approved) {
    SFX.approvalChime();
    state.todayResults[id] = 'done';
    delete state.pendingApprovals[id];
    saveState();
    renderChores();
    checkAllDone();
  } else {
    delete state.pendingApprovals[id];
    if (state.todayFeedback) delete state.todayFeedback[id];
    saveState();
    renderChores();
    setTimeout(() => {
      const card = document.querySelector(`.chore-card[data-id="${id}"]`);
      if (card) card.classList.add('expanded');
    }, 100);
  }
  currentApprovalId = null;
}

function checkAllDone() {
  const chores = getTodaysChores();
  const total = chores.length;
  const allDone = total > 0 && chores.every(c => state.todayResults[c.id] === 'done');
  const badge = document.getElementById('allDoneBadge');

  if (allDone) {
    badge.style.display = 'inline-block';
    if (!state.marbleEarnedToday) {
      state.marbleEarnedToday = true;
      state.marbles += 1;
      saveState();

      document.getElementById('marbleCount').textContent = state.marbles;
      document.getElementById('marbleCountText').textContent = state.marbles;
      document.getElementById('goalText').textContent = state.goal;
      const pct = Math.min(100, (state.marbles / state.goal) * 100);
      document.getElementById('goalBar').style.width = pct + '%';

      const badge2 = document.getElementById('marbleCountBadge');
      if (badge2) { badge2.classList.remove('pop'); void badge2.offsetWidth; badge2.classList.add('pop'); }

      JAR.triggerDrop(() => {
        setTimeout(() => showCelebration(), 300);
      });
    }
  } else {
    badge.style.display = 'none';
  }
}

// ─── CELEBRATION ─────────────────────────────────────────────────────────────
function showCelebration() {
  const goalReached = state.marbles >= state.goal;
  document.getElementById('celebEmoji').textContent = goalReached ? '🏆' : '🎉';
  document.getElementById('celebTitle').textContent = goalReached ? 'PRIZE TIME!!!' : 'Marble Earned!';
  const name = state.name || 'You';
  if (goalReached) {
    document.getElementById('celebText').textContent = `${name} reached ${state.goal} marbles! Time for your prize: ${state.prize || 'an amazing reward'} 🎁`;
    document.getElementById('celebBtn').textContent = 'Claim Prize! 🎁';
  } else {
    document.getElementById('celebText').textContent = `${name} finished all chores! You now have ${state.marbles} marble${state.marbles !== 1 ? 's' : ''}! ${state.goal - state.marbles} more to go! 🫙`;
    document.getElementById('celebBtn').textContent = 'Yay! 🎊';
  }
  document.getElementById('celebrationOverlay').classList.add('show');
  SFX.celebrate();
  launchConfetti();
}

function closeCelebration() {
  document.getElementById('celebrationOverlay').classList.remove('show');
}

function launchConfetti() {
  const colors = ['#FFD93D','#FF8B6A','#C89FE8','#6EC6F5','#6EDFA0','#FF8BCC'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.animationDelay = (Math.random() * 0.5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }, i * 30);
  }
}

// ─── SETTINGS ────────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('settingName').value = state.name;
  document.getElementById('settingTitle').value = state.title;
  document.getElementById('settingGoal').value = state.goal;
  document.getElementById('settingPrize').value = state.prize;
  document.getElementById('settingApiKey').value = state.apiKey;
  document.getElementById('settingsModal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}

function handleModalClick(e) {
  if (e.target === document.getElementById('settingsModal')) closeSettings();
}

function saveSettings() {
  state.name = document.getElementById('settingName').value.trim();
  state.title = document.getElementById('settingTitle').value.trim() || 'My Chore Chart';
  state.goal = parseInt(document.getElementById('settingGoal').value) || 20;
  state.prize = document.getElementById('settingPrize').value.trim();
  state.apiKey = document.getElementById('settingApiKey').value.trim();
  saveState();
  closeSettings();
  render();
}

// ─── CHORE PLANNER ───────────────────────────────────────────────────────────
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let plannerActiveDay = new Date().getDay(); // start on today

function openPlanner() {
  plannerActiveDay = new Date().getDay();
  document.getElementById('plannerScreen').classList.add('open');
  renderPlanner();
}

function closePlanner() {
  document.getElementById('plannerScreen').classList.remove('open');
  // Refresh today's chores in case schedule changed
  state.todayResults = {};
  state.pendingApprovals = {};
  state.todayFeedback = {};
  state.marbleEarnedToday = false;
  saveState();
  render();
}

function renderPlanner() {
  const body = document.getElementById('plannerBody');

  // Build day tabs
  let tabsHTML = '<div class="day-tabs">';
  DAY_SHORT.forEach((name, d) => {
    const hasOverride = state.dayOverrides[d] !== null && state.dayOverrides[d] !== undefined;
    const isWeekend = d === 0 || d === 6;
    const isActive = d === plannerActiveDay;
    tabsHTML += `
      <div class="day-tab ${isActive ? 'active' : ''} ${hasOverride ? 'has-override' : ''}" onclick="switchPlannerDay(${d})">
        ${name}
        <span class="tab-label">${isWeekend ? 'Weekend' : 'Weekday'}</span>
        <div class="override-dot"></div>
      </div>`;
  });
  tabsHTML += '</div>';

  const d = plannerActiveDay;
  const isWeekend = d === 0 || d === 6;
  const hasOverride = state.dayOverrides[d] !== null && state.dayOverrides[d] !== undefined;
  const activeIds = hasOverride ? state.dayOverrides[d] : state.weekdayTemplate;
  const isWeekdayTab = !isWeekend;

  // Weekday template or day override section
  let scheduleTitle, scheduleSub;
  if (!hasOverride && isWeekdayTab) {
    scheduleTitle = `📋 Weekday Template (Mon–Fri)`;
    scheduleSub = 'These chores apply to all weekdays unless overridden';
  } else if (!hasOverride && isWeekend) {
    scheduleTitle = `📋 ${DAY_NAMES[d]} Chores`;
    scheduleSub = 'No custom chores set — using weekday template';
  } else {
    scheduleTitle = `📋 ${DAY_NAMES[d]} Chores (Custom)`;
    scheduleSub = 'Custom chores for this specific day';
  }

  // Override toggle (not for weekday template itself — only for specific days)
  let overrideToggle = '';
  overrideToggle = `
    <div class="override-toggle" onclick="toggleDayOverride(${d})">
      <div class="override-toggle-label">
        ${hasOverride ? `✏️ Custom chores for ${DAY_NAMES[d]}` : `📋 Using weekday template`}
        <div style="font-size:0.72rem;color:#999;margin-top:2px;font-weight:600;">
          ${hasOverride ? 'Tap to revert to weekday template' : 'Tap to set custom chores for this day'}
        </div>
      </div>
      <div class="toggle-pill ${hasOverride ? 'on' : ''}"></div>
    </div>`;

  // Chore checklist for the active schedule
  const checklistIds = hasOverride ? state.dayOverrides[d] : state.weekdayTemplate;
  let checklist = '<div class="chore-checklist">';
  state.choreLibrary.forEach(chore => {
    const checked = checklistIds.includes(chore.id);
    checklist += `
      <div class="chore-check-row ${checked ? 'checked' : ''}" onclick="toggleChoreForDay(${d}, '${chore.id}', ${hasOverride})">
        <div class="chore-check-box">${checked ? '✓' : ''}</div>
        <span class="chore-check-emoji">${chore.emoji}</span>
        <span class="chore-check-name">${chore.name}</span>
      </div>`;
  });
  checklist += '</div>';

  // Chore library editor
  let libraryHTML = '<div class="library-editor" id="libraryEditor">';
  state.choreLibrary.forEach((chore, idx) => {
    libraryHTML += `
      <div class="library-row">
        <input class="lib-emoji-input" value="${chore.emoji}" id="libEmoji-${idx}" maxlength="2"/>
        <input class="lib-name-input"  value="${chore.name}"  id="libName-${idx}"  placeholder="Chore name"/>
        <button class="lib-remove-btn" onclick="removeLibChore('${chore.id}')">✕</button>
      </div>`;
  });
  libraryHTML += `</div>
    <button class="add-lib-btn" onclick="addLibChore()">+ Add new chore to library</button>`;

  body.innerHTML = `
    ${tabsHTML}

    <div class="planner-card">
      <div class="planner-card-title">${scheduleTitle}</div>
      <div class="planner-card-sub">${scheduleSub}</div>
      ${overrideToggle}
      ${checklist}
    </div>

    <div class="planner-card">
      <div class="planner-card-title">📚 Chore Library</div>
      <div class="planner-card-sub">Add, edit or remove chores available to assign</div>
      ${libraryHTML}
    </div>

    <button class="planner-save-btn" onclick="savePlanner()">💾 Save Schedule</button>
    <div style="height:20px"></div>
  `;
}

function switchPlannerDay(d) {
  // Save any library edits before switching
  syncLibraryEdits();
  plannerActiveDay = d;
  renderPlanner();
}

function toggleDayOverride(d) {
  syncLibraryEdits();
  if (state.dayOverrides[d] !== null && state.dayOverrides[d] !== undefined) {
    // Remove override — revert to weekday template
    state.dayOverrides[d] = null;
  } else {
    // Create override — start with a copy of weekday template
    state.dayOverrides[d] = [...state.weekdayTemplate];
  }
  renderPlanner();
}

function toggleChoreForDay(d, choreId, isOverride) {
  syncLibraryEdits();
  // If not overriding yet for this specific day, create override first
  if (!isOverride && d !== plannerActiveDay) return;

  let list;
  if (state.dayOverrides[d] !== null && state.dayOverrides[d] !== undefined) {
    list = state.dayOverrides[d];
  } else {
    list = state.weekdayTemplate;
  }

  const idx = list.indexOf(choreId);
  if (idx > -1) list.splice(idx, 1);
  else list.push(choreId);

  renderPlanner();
}

function addLibChore() {
  syncLibraryEdits();
  state.choreLibrary.push({ id: newChoreId(), emoji: '⭐', name: 'New chore' });
  renderPlanner();
  // Scroll to bottom
  setTimeout(() => {
    const body = document.getElementById('plannerBody');
    body.scrollTop = body.scrollHeight;
  }, 100);
}

function removeLibChore(id) {
  syncLibraryEdits();
  state.choreLibrary = state.choreLibrary.filter(c => c.id !== id);
  // Remove from all schedules
  state.weekdayTemplate = state.weekdayTemplate.filter(cid => cid !== id);
  Object.keys(state.dayOverrides).forEach(d => {
    if (state.dayOverrides[d]) {
      state.dayOverrides[d] = state.dayOverrides[d].filter(cid => cid !== id);
    }
  });
  renderPlanner();
}

function syncLibraryEdits() {
  // Read any in-progress edits from the library editor inputs
  state.choreLibrary.forEach((chore, idx) => {
    const emojiEl = document.getElementById(`libEmoji-${idx}`);
    const nameEl  = document.getElementById(`libName-${idx}`);
    if (emojiEl) chore.emoji = emojiEl.value || '⭐';
    if (nameEl)  chore.name  = nameEl.value  || 'Chore';
  });
}

function savePlanner() {
  syncLibraryEdits();
  saveState();
  // Show brief confirmation
  const btn = document.querySelector('.planner-save-btn');
  btn.textContent = '✅ Saved!';
  btn.style.background = 'linear-gradient(135deg, #6EDFA0, #38C172)';
  setTimeout(() => {
    btn.textContent = '💾 Save Schedule';
    btn.style.background = '';
  }, 1500);
}

// ─── MARBLE DEDUCTION ────────────────────────────────────────────────────────
let deductAmount = 1;

function openDeductModal() {
  SFX.init();
  deductAmount = 1;
  document.getElementById('deductAmountVal').textContent = 1;
  document.getElementById('deductReason').value = '';
  document.getElementById('deductChildName').textContent = state.name || 'your child';
  document.getElementById('deductOverlay').classList.add('open');
}

function closeDeductModal() {
  document.getElementById('deductOverlay').classList.remove('open');
}

function handleDeductOverlayClick(e) {
  if (e.target === document.getElementById('deductOverlay')) closeDeductModal();
}

function changeDeductAmount(delta) {
  deductAmount = Math.max(1, Math.min(state.marbles || 1, deductAmount + delta));
  document.getElementById('deductAmountVal').textContent = deductAmount;
}

function confirmDeduction() {
  const reason = document.getElementById('deductReason').value.trim();
  if (!reason) {
    const el = document.getElementById('deductReason');
    el.style.borderColor = '#FF8B6A';
    el.placeholder = 'Please enter a reason first!';
    setTimeout(() => { el.style.borderColor = ''; }, 1200);
    return;
  }

  const actual = Math.min(deductAmount, state.marbles);
  if (actual <= 0) { closeDeductModal(); return; }

  // Record in log
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  if (!state.deductionLog) state.deductionLog = [];
  state.deductionLog.unshift({ amount: actual, reason, date: dateStr });
  // Keep last 10 entries
  if (state.deductionLog.length > 10) state.deductionLog = state.deductionLog.slice(0, 10);

  // Deduct marbles
  state.marbles = Math.max(0, state.marbles - actual);
  saveState();
  closeDeductModal();

  // Play a sad sound
  SFX.deductSound();

  // Animate marbles being removed from jar
  JAR.removeMarbles(actual, () => {
    // Update UI after animation
    document.getElementById('marbleCount').textContent = state.marbles;
    document.getElementById('marbleCountText').textContent = state.marbles;
    const pct = Math.min(100, (state.marbles / state.goal) * 100);
    document.getElementById('goalBar').style.width = pct + '%';
    renderDeductionLog();

    // Show the child what happened
    showDeductionAlert(actual, reason);
  });
}

function renderDeductionLog() {
  const log = document.getElementById('deductionLog');
  if (!log) return;
  const entries = state.deductionLog || [];
  if (entries.length === 0) { log.innerHTML = ''; return; }
  log.innerHTML = entries.map(e => `
    <div class="deduction-entry">
      <div class="deduction-entry-marbles">−${e.amount} 🔴</div>
      <div class="deduction-entry-reason">${e.reason}</div>
      <div class="deduction-entry-date">${e.date}</div>
    </div>
  `).join('');
}

function showDeductionAlert(amount, reason) {
  // Reuse celebration overlay for the sad message
  const name = state.name || 'Hey';
  document.getElementById('celebEmoji').textContent = '😔';
  document.getElementById('celebTitle').textContent = `${amount} marble${amount > 1 ? 's' : ''} taken away`;
  document.getElementById('celebText').textContent = `"${reason}" — you now have ${state.marbles} marble${state.marbles !== 1 ? 's' : ''}. Keep going, you can earn them back! 💪`;
  document.getElementById('celebBtn').textContent = 'OK, I understand 💛';
  document.getElementById('celebrationOverlay').classList.add('show');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadState();
render();
setTimeout(() => JAR.init(), 100);
</script>
